<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply Holidays Migration</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 { color: #333; }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
        }
        button:hover { background: #2563eb; }
        button:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }
        #status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            display: none;
        }
        .success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #10b981;
        }
        .error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #ef4444;
        }
        .info {
            background: #dbeafe;
            color: #1e40af;
            border: 1px solid #3b82f6;
        }
        pre {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 Apply Holidays Table Migration</h1>
        <p>This will create the <code>holidays</code> table in your Supabase database, allowing you to mark holidays on the month view for each child.</p>

        <button id="applyBtn" onclick="applyMigration()">Apply Migration</button>

        <div id="status"></div>

        <h3 style="margin-top: 30px;">Migration Details:</h3>
        <pre id="migrationSQL"></pre>
    </div>

    <script>
        const SUPABASE_URL = "https://csocuioanbuomhrcbqag.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNzb2N1aW9hbmJ1b21ocmNicWFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTcxODA5OTcsImV4cCI6MjA3Mjc1Njk5N30.AjKy8leu7cvfnpWqtczevpIy1yr3FtI4rCBKKL7Jotk";

        const migrationSQL = \`-- Create holidays table to track special days, vacations, and no-school days for each child
CREATE TABLE IF NOT EXISTS public.holidays (
  id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
  child_id UUID NOT NULL REFERENCES public.children(id) ON DELETE CASCADE,
  date DATE NOT NULL,
  name VARCHAR(255) NOT NULL,
  description TEXT,
  color VARCHAR(7) DEFAULT '#FFA500',
  is_no_school BOOLEAN DEFAULT false,
  created_at TIMESTAMP WITH TIME ZONE DEFAULT timezone('utc'::text, now()) NOT NULL,
  updated_at TIMESTAMP WITH TIME ZONE DEFAULT timezone('utc'::text, now()) NOT NULL
);

CREATE INDEX IF NOT EXISTS idx_holidays_child_id ON public.holidays(child_id);
CREATE INDEX IF NOT EXISTS idx_holidays_date ON public.holidays(date);
CREATE INDEX IF NOT EXISTS idx_holidays_child_date ON public.holidays(child_id, date);

ALTER TABLE public.holidays ENABLE ROW LEVEL SECURITY;

DROP POLICY IF EXISTS "Parents can view their children's holidays" ON public.holidays;
CREATE POLICY "Parents can view their children's holidays"
  ON public.holidays FOR SELECT
  USING (child_id IN (SELECT id FROM public.children WHERE parent_id = auth.uid()));

DROP POLICY IF EXISTS "Parents can create holidays for their children" ON public.holidays;
CREATE POLICY "Parents can create holidays for their children"
  ON public.holidays FOR INSERT
  WITH CHECK (child_id IN (SELECT id FROM public.children WHERE parent_id = auth.uid()));

DROP POLICY IF EXISTS "Parents can update their children's holidays" ON public.holidays;
CREATE POLICY "Parents can update their children's holidays"
  ON public.holidays FOR UPDATE
  USING (child_id IN (SELECT id FROM public.children WHERE parent_id = auth.uid()));

DROP POLICY IF EXISTS "Parents can delete their children's holidays" ON public.holidays;
CREATE POLICY "Parents can delete their children's holidays"
  ON public.holidays FOR DELETE
  USING (child_id IN (SELECT id FROM public.children WHERE parent_id = auth.uid()));

CREATE OR REPLACE FUNCTION public.handle_updated_at()
RETURNS TRIGGER AS $$
BEGIN
  NEW.updated_at = timezone('utc'::text, now());
  RETURN NEW;
END;
$$ LANGUAGE plpgsql;

DROP TRIGGER IF EXISTS set_holidays_updated_at ON public.holidays;
CREATE TRIGGER set_holidays_updated_at
  BEFORE UPDATE ON public.holidays
  FOR EACH ROW
  EXECUTE FUNCTION public.handle_updated_at();\`;

        document.getElementById('migrationSQL').textContent = migrationSQL;

        async function applyMigration() {
            const btn = document.getElementById('applyBtn');
            const status = document.getElementById('status');

            btn.disabled = true;
            btn.textContent = 'Applying...';
            status.style.display = 'block';
            status.className = 'info';
            status.innerHTML = '⏳ Applying migration...';

            try {
                const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

                // Execute the SQL using Supabase's RPC or direct query
                const { data, error } = await supabase.rpc('exec_sql', { sql: migrationSQL });

                if (error) {
                    throw error;
                }

                status.className = 'success';
                status.innerHTML = '<strong>✅ Success!</strong><br>The holidays table has been created successfully. You can now mark holidays in the month view!';
                btn.textContent = 'Migration Applied';
            } catch (error) {
                console.error('Error:', error);
                status.className = 'error';
                status.innerHTML = \`<strong>❌ Error</strong><br>\${error.message}<br><br>
                    <strong>Manual Steps:</strong><br>
                    1. Go to <a href="https://supabase.com/dashboard/project/csocuioanbuomhrcbqag/sql/new" target="_blank">Supabase SQL Editor</a><br>
                    2. Copy the SQL from below and paste it there<br>
                    3. Click "Run"\`;
                btn.disabled = false;
                btn.textContent = 'Try Again';
            }
        }
    </script>
</body>
</html>
